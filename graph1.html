<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>graph1</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script>
(function() {
  function renderAllMath() {
    document.querySelectorAll('span.math').forEach(function(el) {
      katex.render(el.textContent, el, {throwOnError: false, displayMode: false});
    });
  }
  var script = document.createElement('script');
  script.src = 'https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js';
  script.onload = renderAllMath;
  document.head.appendChild(script);
})();
</script>
<style>
  body {
    margin: 0;
    padding: 24px;
    background: #fafafa;
    color: #222;
    font-family: 'Noto Sans KR', 'Malgun Gothic', sans-serif;
  }
  .frame {
    width: fit-content;
    margin: 0 auto;
    padding: 18px;
    background: white;
    border: 1px solid #ddd;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
  }
  svg {
    display: block;
    max-width: 100%;
    height: auto;
  }
</style>
</head>

  <text x="547.7" y="98.4" fill="#111111" font-family="HCR Batang,'함초롬바탕',serif" font-weight="700" font-size="28px" text-anchor="middle" dominant-baseline="middle">

    <tspan baseline-shift="baseline">x</tspan>

  </text>
  <!-- 교점의 굵은 점 그리기 -->
  <ellipse cx="119.7" cy="558.5" rx="4.8" ry="4.9" fill="#000000" stroke="#000000" stroke-width="0.50"/>
  <!-- 교점의 굵은 점 그리기 -->
  <ellipse cx="485.3" cy="103.3" rx="5.6" ry="4.9" fill="#000000" stroke="#000000" stroke-width="0.50"/>

  <line x1="121.5" y1="553.6" x2="486.1" y2="103.7" stroke="#ca56a7" stroke-width="2.37"   />
</svg>
</div>
