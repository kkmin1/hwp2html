<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>graph2</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script>
(function() {
  function renderAllMath() {
    document.querySelectorAll('span.math').forEach(function(el) {
      katex.render(el.textContent, el, {throwOnError: false, displayMode: false});
    });
  }
  var script = document.createElement('script');
  script.src = 'https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js';
  script.onload = renderAllMath;
  document.head.appendChild(script);
})();
</script>
<style>
  body {
    margin: 0;
    padding: 24px;
    background: #fafafa;
    color: #222;
    font-family: 'Noto Sans KR', 'Malgun Gothic', sans-serif;
  }
  .frame {
    width: fit-content;
    margin: 0 auto;
    padding: 18px;
    background: white;
    border: 1px solid #ddd;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
  }
  svg {
    display: block;
    max-width: 100%;
    height: auto;
  }
</style>
</head>
<body>
<div class="frame">
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xhtml="http://www.w3.org/1999/xhtml" viewBox="-15.0 -15.0 840.3 671.8" width="467" height="373" style="display:block;margin:1em auto;overflow:visible;">
  <!-- 화살표 마커 정의 -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L7,3 z" fill="#000"/>
    </marker>
  </defs>
  <!-- 도형 본체 시작 -->
  <!-- 연결선 그리기 -->
  <line x1="82.9" y1="594.6" x2="676.9" y2="595.3" stroke="#000000" stroke-width="1.97"  marker-start="url(#arr)"/>
  <!-- 연결선 그리기 -->
  <line x1="83.8" y1="53.6" x2="82.9" y2="597.1" stroke="#000000" stroke-width="1.97" marker-end="url(#arr)" />
  <!-- 라벨 배치용 사각형 -->
  <rect x="690.6" y="567.4" width="119.7" height="59.6" fill="none" stroke="none" stroke-width="0.50"/>
  <!-- 축 이름/좌표 라벨 텍스트 -->
  <text x="750.5" y="597.2" fill="#111111" font-family="HCR Batang,'함초롬바탕',serif" font-weight="700" font-size="28px" text-anchor="middle" dominant-baseline="middle">
    <tspan baseline-shift="baseline">X</tspan>
  </text>
  <!-- 라벨 배치용 사각형 -->
  <rect x="64.5" y="0.0" width="133.2" height="51.5" fill="none" stroke="none" stroke-width="0.50"/>
  <!-- 축 이름/좌표 라벨 텍스트 -->
  <text x="131.1" y="25.7" fill="#111111" font-family="HCR Batang,'함초롬바탕',serif" font-weight="700" font-size="28px" text-anchor="middle" dominant-baseline="middle">
    <tspan baseline-shift="baseline">Y</tspan>
  </text>
  <!-- 라벨 배치용 사각형 -->
  <rect x="56.5" y="589.9" width="38.0" height="51.9" fill="none" stroke="none" stroke-width="0.50"/>
  <!-- 축 이름/좌표 라벨 텍스트 -->
  <text x="75.5" y="615.8" fill="#111111" font-family="HCR Batang,'함초롬바탕',serif" font-weight="700" font-size="28px" text-anchor="middle" dominant-baseline="middle">
    <tspan baseline-shift="baseline">0</tspan>
  </text>
  <!-- 곡선 도형 그리기 -->
  <path d="M 164.6 147.7 L 321.4 193.1 L 352.6 341.3 L 431.5 456.9 L 570.7 484.0" fill="none" stroke="#ff0000" stroke-width="0.78" />
  <!-- 라벨 배치용 사각형 -->
  <rect x="131.1" y="93.3" width="145.1" height="51.5" fill="none" stroke="none" stroke-width="0.50"/>
  <!-- 축 이름/좌표 라벨 텍스트 -->
  <text x="203.7" y="119.0" fill="#111111" font-family="HCR Batang,'함초롬바탕',serif" font-weight="700" font-size="28px" text-anchor="middle" dominant-baseline="middle">
    <tspan baseline-shift="baseline">A</tspan>
    <tspan baseline-shift="baseline">(</tspan>
    <tspan baseline-shift="baseline">a</tspan>
    <tspan baseline-shift="baseline">,</tspan>
    <tspan baseline-shift="baseline"> </tspan>
    <tspan baseline-shift="baseline">b</tspan>
    <tspan baseline-shift="baseline">)</tspan>
  </text>
  <!-- 라벨 배치용 사각형 -->
  <rect x="579.1" y="452.3" width="139.3" height="55.1" fill="none" stroke="none" stroke-width="0.50"/>
  <!-- 축 이름/좌표 라벨 텍스트 -->
  <text x="648.7" y="479.9" fill="#111111" font-family="HCR Batang,'함초롬바탕',serif" font-weight="700" font-size="28px" text-anchor="middle" dominant-baseline="middle">
    <tspan baseline-shift="baseline">B</tspan>
    <tspan baseline-shift="baseline">(</tspan>
    <tspan baseline-shift="baseline">c</tspan>
    <tspan baseline-shift="baseline">,</tspan>
    <tspan baseline-shift="baseline"> </tspan>
    <tspan baseline-shift="baseline">d</tspan>
    <tspan baseline-shift="baseline">)</tspan>
  </text>
  <!-- 교점의 굵은 점 그리기 -->
  <ellipse cx="163.4" cy="149.4" rx="4.5" ry="4.7" fill="#000000" stroke="#ff0000" stroke-width="0.50"/>
  <!-- 교점의 굵은 점 그리기 -->
  <ellipse cx="574.9" cy="484.5" rx="4.5" ry="4.7" fill="#000000" stroke="#ff0000" stroke-width="0.50"/>
  <!-- 교점의 굵은 점 그리기 -->
  <ellipse cx="348.4" cy="330.0" rx="4.5" ry="4.7" fill="#000000" stroke="#ff0000" stroke-width="0.50"/>
  <!-- 라벨 배치용 사각형 -->
  <rect x="350.6" y="302.4" width="127.6" height="51.9" fill="none" stroke="none" stroke-width="0.50"/>
  <!-- 축 이름/좌표 라벨 텍스트 -->
  <text x="414.4" y="328.3" fill="#111111" font-family="HCR Batang,'함초롬바탕',serif" font-weight="700" font-size="28px" text-anchor="middle" dominant-baseline="middle">
    <tspan baseline-shift="baseline">(</tspan>
    <tspan baseline-shift="baseline">x</tspan>
    <tspan baseline-shift="baseline">,</tspan>
    <tspan baseline-shift="baseline"> </tspan>
    <tspan baseline-shift="baseline">y</tspan>
    <tspan baseline-shift="baseline">)</tspan>
  </text>
  <!-- 점선 선분 그리기 -->
  <line x1="164.6" y1="151.0" x2="83.8" y2="149.9" stroke="#000000" stroke-width="0.50" stroke-dasharray="4,4"  />
  <!-- 점선 선분 그리기 -->
  <line x1="350.6" y1="329.4" x2="83.8" y2="329.3" stroke="#000000" stroke-width="0.50" stroke-dasharray="4,4"  />
  <!-- 곡선 도형 그리기 -->
  <path d="M 84.8 152.1 L 70.4 200.7 L 66.4 250.5 L 74.4 301.3 L 84.0 328.3" fill="none" stroke="#000000" stroke-width="0.50" />
  <!-- 라벨 배치용 사각형 -->
  <rect x="0.0" y="206.1" width="94.5" height="55.1" fill="none" stroke="none" stroke-width="0.50"/>
  <!-- 축 이름/좌표 라벨 텍스트 -->
  <text x="47.2" y="233.7" fill="#111111" font-family="HCR Batang,'함초롬바탕',serif" font-weight="700" font-size="28px" text-anchor="middle" dominant-baseline="middle">
    <tspan baseline-shift="baseline">b</tspan>
    <tspan baseline-shift="baseline">-</tspan>
    <tspan baseline-shift="baseline">y</tspan>
  </text>
</svg>
</div>
</body>
</html>
